name: Check assets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install pillow

      - name: Verify icon size and dimensions
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          p = Path("apple-icon.png")
          if not p.exists():
              raise SystemExit("apple-icon.png missing")
          size = p.stat().st_size
          if size > 500_000:
              raise SystemExit(f"apple-icon.png too large: {size} bytes (max 500KB)")
          img = Image.open(p)
          if max(img.size) > 512:
              raise SystemExit(f"apple-icon.png too big: {img.size} (max 512px)")
          print(f"OK: apple-icon.png {img.size[0]}x{img.size[1]}, {size:,} bytes")
          PY
